services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hc-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hc-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      JWT_SECRET: ${JWT_SECRET:-mySecretKey123456789012345678901234567890}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-service-key-2024}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - hc-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: hc-notification
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      BACKEND_URL: http://backend:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-service-key-2024}
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hc-network

networks:
  hc-network:
    driver: bridge
